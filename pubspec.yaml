name: fiatpe_payments_sdk
description: "The All-in-One FiatPe Payment Gateway Flutter library is a robust solution designed to simplify digital payment acceptance in your Flutter applications."
version: 1.1.0
homepage: https://github.com/fiatpe/fiatpe_payments_sdk.git

environment:
  sdk: '>=3.4.1 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  logger: ^2.6.2

  # Allows converting json to dart class and back
  json_annotation: ^4.11.0

  # Networking Libraries
  retrofit: ^4.9.2 # Bumped to match modern generator
  built_value: ^8.12.4
  rxdart: ^0.28.0
  crypto: ^3.0.7
  lottie: ^3.3.2
  freezed_annotation: ^3.1.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Networking generators
  retrofit_generator: ^10.2.3 # Bumped from ^5.0.0 to fix source_gen conflict
  built_value_generator: ^8.12.4
  build_runner: ^2.12.1
  json_serializable: ^6.13.0 # Bumped from ^6.5.4 to support json_annotation ^4.11.0
  freezed: ^3.2.5
  envied_generator: ^1.3.3

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # This section identifies this Flutter project as a plugin project.
  # The 'pluginClass' specifies the class (in Java, Kotlin, Swift, Objective-C, etc.)
  # which should be registered in the plugin registry. This is required for
  # using method channels.
  # The Android 'package' specifies package in which the registered class is.
  # This is required for using method channels on Android.
  # The 'ffiPlugin' specifies that native code should be built and bundled.
  # This is required for using `dart:ffi`.
  # All these are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  plugin:
    platforms:
      android:
        package: com.fiatpe.fiatpe_payments_sdk
        pluginClass: FiatpePaymentsSdkPlugin
      ios:
        pluginClass: FiatpePaymentsSdkPlugin

  # To add assets to your plugin package, add an assets section, like this:
  assets:
    - assets/images/
    - assets/anim/
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/assets-and-images/#from-packages
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # To add custom fonts to your plugin package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/custom-fonts/#from-packages
